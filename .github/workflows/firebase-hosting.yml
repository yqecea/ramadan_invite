name: Deploy to Firebase Hosting
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy both sites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy ramadan-invite (original)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GEN_LANG_CLIENT_0698883101 }}
          channelId: live
          target: ramadan-invite

      - name: Deploy ramadan-mubarak (akhi)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GEN_LANG_CLIENT_0698883101 }}
          channelId: live
          target: ramadan-mubarak
